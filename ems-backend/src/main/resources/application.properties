spring.application.name=ems-backend

# Microsoft SQL Server Database Connection (SQL Server Authentication)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EducationManagementDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Admin@1234
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CRITICAL: Set to 'none' so Spring does not overwrite your custom SQL tables and triggers
spring.jpa.hibernate.ddl-auto=none

# Tell Hibernate to use our exact column names, not snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl